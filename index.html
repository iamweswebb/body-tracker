<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#1c1c1e;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
.app{max-width:480px;margin:0 auto;padding:1.5rem 1rem 3rem;}
.top-tabs{display:flex;gap:6px;margin-bottom:1.75rem;background:#2a2a2e;border-radius:12px;padding:4px;}
.top-tab{flex:1;padding:8px 14px;border:none;border-radius:9px;font-size:14px;font-weight:500;cursor:pointer;background:transparent;color:#888;text-align:center;transition:all 0.15s;}
.top-tab.active{background:#2f2f35;color:#f5f5f5;box-shadow:0 1px 4px rgba(0,0,0,0.4);}
.world{display:none;}
.world.active{display:block;}
.sub-tabs{display:flex;gap:6px;margin-bottom:1.25rem;}
.sub-tab{padding:5px 16px;border:1px solid #333;border-radius:20px;font-size:12px;cursor:pointer;background:transparent;color:#666;transition:all 0.15s;}
.sub-tab.active{background:#E8963A;color:#1c1c1e;border-color:#E8963A;font-weight:500;}
.subpage{display:none;}
.subpage.active{display:block;}
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:1.5rem;}
.metric{background:#252528;border-radius:12px;padding:0.75rem;}
.metric-label{font-size:10px;color:#555;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.05em;}
.metric-value{font-size:20px;font-weight:500;color:#f0f0f0;}
.metric-sub{font-size:10px;color:#444;margin-top:2px;}
.volume-card{background:#252528;border-radius:16px;padding:1.25rem;margin-bottom:1rem;box-shadow:0 2px 12px rgba(0,0,0,0.3);}
.volume-label{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px;}
.volume-total{font-size:32px;font-weight:500;color:#E8963A;letter-spacing:-0.5px;}
.volume-sub{font-size:12px;color:#555;margin-top:4px;}
.card{background:#252528;border-radius:16px;padding:1.25rem;margin-bottom:1rem;box-shadow:0 2px 12px rgba(0,0,0,0.3);}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.field label{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:0.05em;}
.field input,.field select{width:100%;padding:10px 12px;font-size:14px;border:1px solid #333;border-radius:10px;background:#1c1c1e;color:#f0f0f0;outline:none;-webkit-appearance:none;}
.field input:focus,.field select:focus{border-color:#E8963A;}
.field select option{background:#252528;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.opt-group{display:flex;gap:6px;flex-wrap:wrap;}
.opt-btn{padding:6px 14px;border:1px solid #333;border-radius:20px;font-size:13px;cursor:pointer;background:transparent;color:#666;transition:all 0.15s;}
.opt-btn.selected{background:#E8963A;color:#1c1c1e;border-color:#E8963A;font-weight:500;}
.save-btn{padding:12px 20px;background:#E8963A;border:none;border-radius:12px;font-size:14px;font-weight:500;cursor:pointer;color:#1c1c1e;width:100%;margin-top:4px;transition:opacity 0.15s;}
.save-btn:hover{opacity:0.88;}
.chart-title{font-size:10px;font-weight:500;color:#555;margin-bottom:1rem;text-transform:uppercase;letter-spacing:0.07em;}
.htable{width:100%;font-size:13px;border-collapse:collapse;}
.htable th{font-size:10px;color:#555;text-align:left;padding:4px 6px;border-bottom:1px solid #333;font-weight:400;text-transform:uppercase;letter-spacing:0.05em;}
.htable td{padding:9px 6px;border-bottom:1px solid #2a2a2e;color:#ccc;}
.htable tr:last-child td{border-bottom:none;}
.set-row{display:flex;gap:8px;align-items:flex-end;margin-bottom:8px;}
.set-num{font-size:11px;color:#555;align-self:flex-end;padding-bottom:11px;min-width:18px;}
.remove-btn{padding:8px 10px;border:1px solid #333;border-radius:8px;font-size:12px;cursor:pointer;background:transparent;color:#555;align-self:flex-end;transition:all 0.15s;}
.remove-btn:hover{color:#E8963A;border-color:#E8963A;}
.add-set-btn{padding:6px 16px;border:1px solid #333;border-radius:20px;font-size:13px;cursor:pointer;background:transparent;color:#888;margin-bottom:1rem;transition:all 0.15s;}
.add-set-btn:hover{border-color:#E8963A;color:#E8963A;}
.hint{font-size:12px;color:#888;margin-bottom:1rem;padding:8px 12px;background:#1c1c1e;border-radius:10px;border-left:2px solid #E8963A;}
.overload-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-bottom:1.5rem;}
.overload-card{background:#252528;border-radius:14px;padding:0.875rem 1rem;box-shadow:0 2px 8px rgba(0,0,0,0.25);}
.overload-name{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px;}
.overload-weight{font-size:22px;font-weight:500;color:#f0f0f0;}
.overload-meta{font-size:11px;color:#555;margin-top:2px;}
.delta-up{font-size:11px;color:#7dba4a;margin-top:4px;}
.delta-same{font-size:11px;color:#555;margin-top:4px;}
.delta-down{font-size:11px;color:#d95f4b;margin-top:4px;}
.new-mov-input{display:none;width:100%;padding:10px 12px;font-size:14px;border:1px solid #E8963A;border-radius:10px;background:#1c1c1e;color:#f0f0f0;outline:none;margin-top:6px;}
.workout-summary{background:#1c1c1e;border-radius:10px;padding:10px 12px;margin-top:8px;margin-bottom:4px;border-left:2px solid #E8963A;font-size:13px;color:#888;display:none;}
.workout-summary span{color:#E8963A;font-weight:500;}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#E8963A;border-radius:20px;padding:8px 20px;font-size:13px;font-weight:500;color:#1c1c1e;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;z-index:100;}
.toast.show{opacity:1;}
</style>
</head>
<body>
<div class="app">
  <div class="top-tabs">
    <button class="top-tab active" onclick="switchWorld('body',event)">Body</button>
    <button class="top-tab" onclick="switchWorld('workout',event)">Workout</button>
  </div>

  <div id="world-body" class="world active">
    <div class="sub-tabs">
      <button class="sub-tab active" onclick="switchSub('body','log',event)">Log</button>
      <button class="sub-tab" onclick="switchSub('body','charts',event)">Charts</button>
      <button class="sub-tab" onclick="switchSub('body','history',event)">History</button>
    </div>
    <div id="body-log" class="subpage active">
      <div class="metrics">
        <div class="metric"><div class="metric-label">Weight</div><div class="metric-value" id="m-weight">—</div><div class="metric-sub">lbs</div></div>
        <div class="metric"><div class="metric-label">Drinks</div><div class="metric-value" id="m-drinks">—</div><div class="metric-sub">7-day avg</div></div>
        <div class="metric"><div class="metric-label">Days</div><div class="metric-value" id="m-days">0</div><div class="metric-sub">logged</div></div>
        <div class="metric"><div class="metric-label">Streak</div><div class="metric-value" id="m-streak">0</div><div class="metric-sub">days</div></div>
      </div>
      <div class="card">
        <div class="two-col">
          <div class="field"><label>Date</label><input type="date" id="log-date"/></div>
          <div class="field"><label>Weight (lbs)</label><input type="number" id="log-weight" placeholder="206" step="0.1"/></div>
        </div>
        <div class="field"><label>Drinks tonight</label><input type="number" id="log-drinks" placeholder="0" min="0" step="1"/></div>
        <div class="field"><label>Food today</label>
          <div class="opt-group" id="food-opts">
            <button class="opt-btn" onclick="selectOpt('food','under',event)">Under</button>
            <button class="opt-btn" onclick="selectOpt('food','average',event)">Average</button>
            <button class="opt-btn" onclick="selectOpt('food','over',event)">Over</button>
            <button class="opt-btn" onclick="selectOpt('food','excess',event)">Excess</button>
          </div>
        </div>
        <div class="field"><label>Sleep last night</label>
          <div class="opt-group" id="sleep-opts">
            <button class="opt-btn" onclick="selectOpt('sleep','great',event)">Great</button>
            <button class="opt-btn" onclick="selectOpt('sleep','average',event)">Average</button>
            <button class="opt-btn" onclick="selectOpt('sleep','poor',event)">Poor</button>
            <button class="opt-btn" onclick="selectOpt('sleep','rough',event)">Rough</button>
          </div>
        </div>
        <button class="save-btn" onclick="saveBodyEntry()">Save</button>
      </div>
    </div>
    <div id="body-charts" class="subpage">
      <div class="card"><div class="chart-title">Weight over time</div><div style="position:relative;width:100%;height:200px;"><canvas id="chart-weight"></canvas></div></div>
      <div class="card"><div class="chart-title">Drinks per night</div><div style="position:relative;width:100%;height:180px;"><canvas id="chart-drinks"></canvas></div></div>
      <div class="card"><div class="chart-title">Food</div><div style="position:relative;width:100%;height:180px;"><canvas id="chart-food"></canvas></div></div>
      <div class="card"><div class="chart-title">Sleep</div><div style="position:relative;width:100%;height:180px;"><canvas id="chart-sleep"></canvas></div></div>
    </div>
    <div id="body-history" class="subpage">
      <div class="card"><table class="htable"><thead><tr><th>Date</th><th>Weight</th><th>Drinks</th><th>Food</th><th>Sleep</th></tr></thead><tbody id="body-history-body"></tbody></table></div>
    </div>
  </div>

  <div id="world-workout" class="world">
    <div class="sub-tabs">
      <button class="sub-tab active" onclick="switchSub('workout','log',event)">Log</button>
      <button class="sub-tab" onclick="switchSub('workout','charts',event)">Charts</button>
      <button class="sub-tab" onclick="switchSub('workout','history',event)">History</button>
    </div>
    <div id="workout-log" class="subpage active">
      <div class="volume-card">
        <div class="volume-label">2026 volume</div>
        <div class="volume-total" id="volume-total">—</div>
        <div class="volume-sub" id="volume-sub">lbs moved this year</div>
      </div>
      <div class="overload-grid" id="overload-grid"></div>
      <div class="card">
        <div class="field"><label>Date</label><input type="date" id="workout-date"/></div>
        <div class="field">
          <label>Movement</label>
          <select id="mov-select" onchange="onMovementChange()"></select>
          <input class="new-mov-input" id="new-mov-input" placeholder="Movement name" onblur="confirmNewMovement()"/>
        </div>
        <div id="hint-box" class="hint" style="display:none;"></div>
        <div id="sets-container"></div>
        <button class="add-set-btn" onclick="addSetRow()">+ Add set</button>
        <div class="workout-summary" id="workout-summary">Session volume: <span id="summary-vol">0</span> lbs</div>
        <button class="save-btn" onclick="saveWorkout()">Save workout</button>
      </div>
    </div>
    <div id="workout-charts" class="subpage">
      <div id="workout-chart-container"></div>
    </div>
    <div id="workout-history" class="subpage">
      <div class="card"><table class="htable"><thead><tr><th>Date</th><th>Movement</th><th>Weight</th><th>Reps</th></tr></thead><tbody id="workout-history-body"></tbody></table></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

  try{const r=localStorage.getItem(BODY_KEY);if(r)bodyEntries=JSON.parse(r);}catch(e){}
  try{const r=localStorage.getItem(WORKOUT_KEY);if(r)workoutSets=JSON.parse(r);}catch(e){}
  try{const r=localStorage.getItem(MOV_KEY);if(r)movements=JSON.parse(r);}catch(e){}
  if(!localStorage.getItem(IMPORTED_KEY)){
    const existingIds=new Set(workoutSets.map(s=>s.id));
    const toAdd=HEVY_DATA.filter(s=>!existingIds.has(s.id));
    workoutSets=[...workoutSets,...toAdd];
    workoutSets.sort((a,b)=>a.date.localeCompare(b.date));
    localStorage.setItem(WORKOUT_KEY,JSON.stringify(workoutSets));
    localStorage.setItem(IMPORTED_KEY,'true');
    const newMovements=[...new Set(HEVY_DATA.map(s=>s.movement))];
    newMovements.forEach(m=>{if(!movements.includes(m))movements.push(m);});
    localStorage.setItem(MOV_KEY,JSON.stringify(movements));
  }
  updateBodySummary();renderBodyHistory();renderOverloadGrid();renderWorkoutHistory();
  updateVolumeTotal();buildMovementSelect();addSetRow();
}

function saveBody(){try{localStorage.setItem(BODY_KEY,JSON.stringify(bodyEntries));}catch(e){}}
function saveWorkouts(){try{localStorage.setItem(WORKOUT_KEY,JSON.stringify(workoutSets));}catch(e){}}
function saveMovements(){try{localStorage.setItem(MOV_KEY,JSON.stringify(movements));}catch(e){}}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

function switchWorld(world,e){
  document.querySelectorAll('.top-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.world').forEach(w=>w.classList.remove('active'));
  e.target.classList.add('active');
  document.getElementById('world-'+world).classList.add('active');
}

function switchSub(world,sub,e){
  const worldEl=document.getElementById('world-'+world);
  worldEl.querySelectorAll('.sub-tab').forEach(t=>t.classList.remove('active'));
  worldEl.querySelectorAll('.subpage').forEach(s=>s.classList.remove('active'));
  e.target.classList.add('active');
  document.getElementById(world+'-'+sub).classList.add('active');
  if(world==='body'&&sub==='charts')buildBodyCharts();
  if(world==='workout'&&sub==='charts')buildWorkoutCharts();
}

function selectOpt(type,val,e){
  selected[type]=val;
  document.getElementById(type+'-opts').querySelectorAll('.opt-btn').forEach(b=>b.classList.remove('selected'));
  e.target.classList.add('selected');
}

function updateVolumeTotal(){
  const total=workoutSets.reduce((s,w)=>s+(w.weight*w.reps),0);
  document.getElementById('volume-total').textContent=total.toLocaleString()+' lbs';
  document.getElementById('volume-sub').textContent=`moved in 2026 across ${workoutSets.length} sets`;
}

function saveBodyEntry(){
  const date=document.getElementById('log-date').value;
  const weight=parseFloat(document.getElementById('log-weight').value);
  const drinks=parseInt(document.getElementById('log-drinks').value);
  if(!date){showToast('Pick a date first');return;}
  const entry={date,weight:isNaN(weight)?null:weight,drinks:isNaN(drinks)?0:drinks,food:selected.food,sleep:selected.sleep};
  const idx=bodyEntries.findIndex(e=>e.date===date);
  if(idx>=0)bodyEntries[idx]=entry;else bodyEntries.push(entry);
  bodyEntries.sort((a,b)=>a.date.localeCompare(b.date));
  saveBody();updateBodySummary();renderBodyHistory();showToast('Saved');
  document.getElementById('log-weight').value='';
  document.getElementById('log-drinks').value='';
  selected={food:null,sleep:null};
  document.querySelectorAll('.opt-btn').forEach(b=>b.classList.remove('selected'));
}

function calcStreak(){
  if(!bodyEntries.length)return 0;
  let streak=0,cur=new Date();
  while(true){const d=cur.toISOString().slice(0,10);if(bodyEntries.find(e=>e.date===d)){streak++;cur.setDate(cur.getDate()-1);}else break;}
  return streak;
}

function updateBodySummary(){
  const ww=bodyEntries.filter(e=>e.weight);
  document.getElementById('m-weight').textContent=ww.length?ww[ww.length-1].weight.toFixed(1):'—';
  const l7=bodyEntries.slice(-7);
  const avg=l7.length?(l7.reduce((s,e)=>s+(e.drinks||0),0)/l7.length):null;
  document.getElementById('m-drinks').textContent=avg!==null?avg.toFixed(1):'—';
  document.getElementById('m-days').textContent=bodyEntries.length;
  document.getElementById('m-streak').textContent=calcStreak();
}

function renderBodyHistory(){
  const tbody=document.getElementById('body-history-body');
  if(!bodyEntries.length){tbody.innerHTML='<tr><td colspan="5" style="text-align:center;padding:2rem;color:#444;font-size:13px;">No entries yet</td></tr>';return;}
  tbody.innerHTML=[...bodyEntries].reverse().slice(0,60).map(e=>{
    const fd=e.food?`<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${foodDot[e.food]};margin-right:4px;vertical-align:middle;"></span>${foodLabels[e.food]}`:'—';
    const sd=e.sleep?`<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${sleepDot[e.sleep]};margin-right:4px;vertical-align:middle;"></span>${e.sleep}`:'—';
    return `<tr><td>${e.date.slice(5)}</td><td>${e.weight?e.weight.toFixed(1):'—'}</td><td>${e.drinks??'—'}</td><td>${fd}</td><td>${sd}</td></tr>`;
  }).join('');
}

function buildMovementSelect(){
  const sel=document.getElementById('mov-select');
  const coreFirst=['Incline press','T-bar row','Hex bar deadlift','Leg press','Lat pulldown'];
  const others=movements.filter(m=>!coreFirst.includes(m)).sort();
  sel.innerHTML=[...coreFirst,...others].map(m=>`<option value="${m}">${m}</option>`).join('')+'<option value="__new__">+ New movement...</option>';
  updateHintBox();
}

function onMovementChange(){
  const sel=document.getElementById('mov-select');
  const inp=document.getElementById('new-mov-input');
  if(sel.value==='__new__'){inp.style.display='block';inp.focus();}
  else{inp.style.display='none';updateHintBox();}
}

function confirmNewMovement(){
  const inp=document.getElementById('new-mov-input');
  const val=inp.value.trim();
  if(!val){document.getElementById('mov-select').value=movements[0];inp.style.display='none';return;}
  if(!movements.includes(val)){movements.push(val);saveMovements();}
  buildMovementSelect();
  document.getElementById('mov-select').value=val;
  inp.style.display='none';inp.value='';
  updateHintBox();
}

function updateHintBox(){
  const mov=document.getElementById('mov-select').value;
  const hint=document.getElementById('hint-box');
  if(mov==='__new__'){hint.style.display='none';return;}
  const last=workoutSets.filter(s=>s.movement===mov).sort((a,b)=>b.date.localeCompare(a.date));
  if(!last.length){hint.style.display='none';return;}
  const lastDate=last[0].date;
  const lastSets=last.filter(s=>s.date===lastDate);
  hint.style.display='block';
  hint.innerHTML='<span style="color:#E8963A;font-weight:500;">Last:</span> '+lastSets.map(s=>`${s.weight} × ${s.reps}`).join(' · ')+` <span style="color:#555;">${lastDate.slice(5)}</span>`;
}

function addSetRow(){
  setCount++;
  const id=setCount;
  const container=document.getElementById('sets-container');
  const div=document.createElement('div');
  div.className='set-row';div.dataset.sid=id;
  div.innerHTML=`
    <span class="set-num">${id}</span>
    <div class="field" style="flex:1;margin-bottom:0;"><label>Weight</label><input type="number" id="sw-${id}" placeholder="200" min="0" step="2.5" oninput="updateSessionVolume()"/></div>
    <div class="field" style="flex:1;margin-bottom:0;"><label>Reps</label><input type="number" id="sr-${id}" placeholder="8" min="1" max="100" oninput="updateSessionVolume()"/></div>
    <button class="remove-btn" onclick="removeSetRow(${id})">✕</button>
  `;
  container.appendChild(div);
}

function removeSetRow(id){
  const el=document.querySelector(`[data-sid="${id}"]`);
  if(el){el.remove();updateSessionVolume();}
}

function updateSessionVolume(){
  const rows=document.querySelectorAll('#sets-container .set-row');
  let total=0;
  rows.forEach(row=>{
    const sid=row.dataset.sid;
    const w=parseFloat(document.getElementById('sw-'+sid)?.value)||0;
    const r=parseInt(document.getElementById('sr-'+sid)?.value)||0;
    total+=w*r;
  });
  const summary=document.getElementById('workout-summary');
  const vol=document.getElementById('summary-vol');
  if(total>0){summary.style.display='block';vol.textContent=total.toLocaleString();}
  else{summary.style.display='none';}
}

function saveWorkout(){
  const date=document.getElementById('workout-date').value;
  const mov=document.getElementById('mov-select').value;
  if(!date){showToast('Pick a date first');return;}
  if(mov==='__new__'){showToast('Finish entering movement name');return;}
  const rows=document.querySelectorAll('#sets-container .set-row');
  const newSets=[];
  rows.forEach(row=>{
    const sid=row.dataset.sid;
    const weight=parseFloat(document.getElementById('sw-'+sid)?.value);
    const reps=parseInt(document.getElementById('sr-'+sid)?.value);
    if(!isNaN(weight)&&!isNaN(reps))newSets.push({id:Date.now()+Math.random(),date,movement:mov,weight,reps});
  });
  if(!newSets.length){showToast('Add at least one complete set');return;}
  workoutSets=workoutSets.filter(s=>!(s.date===date&&s.movement===mov));
  workoutSets.push(...newSets);
  workoutSets.sort((a,b)=>a.date.localeCompare(b.date));
  saveWorkouts();renderOverloadGrid();renderWorkoutHistory();updateVolumeTotal();
  showToast('Workout saved');
  document.getElementById('sets-container').innerHTML='';
  document.getElementById('workout-summary').style.display='none';
  setCount=0;addSetRow();updateHintBox();
}

function renderOverloadGrid(){
  const grid=document.getElementById('overload-grid');
  const core=['Incline press','T-bar row','Hex bar deadlift','Leg press','Lat pulldown'];
  const logged=core.filter(m=>workoutSets.some(s=>s.movement===m));
  if(!logged.length){grid.innerHTML='';return;}
  grid.innerHTML=logged.map(m=>{
    const sessions=[...new Set(workoutSets.filter(s=>s.movement===m).map(s=>s.date))].sort();
    const lastDate=sessions[sessions.length-1];
    const prevDate=sessions.length>1?sessions[sessions.length-2]:null;
    const lastSets=workoutSets.filter(s=>s.movement===m&&s.date===lastDate);
    const maxLast=Math.max(...lastSets.map(s=>s.weight));
    let deltaHtml='';
    if(prevDate){
      const maxPrev=Math.max(...workoutSets.filter(s=>s.movement===m&&s.date===prevDate).map(s=>s.weight));
      const diff=maxLast-maxPrev;
      if(diff>0)deltaHtml=`<div class="delta-up">▲ ${diff} lbs</div>`;
      else if(diff<0)deltaHtml=`<div class="delta-down">▼ ${Math.abs(diff)} lbs</div>`;
      else deltaHtml=`<div class="delta-same">— same</div>`;
    }
    return `<div class="overload-card"><div class="overload-name">${m}</div><div class="overload-weight">${maxLast} <span style="font-size:13px;color:#555;">lbs</span></div><div class="overload-meta">${lastSets.map(s=>`${s.weight}×${s.reps}`).join(' · ')}</div><div class="overload-meta">${lastDate.slice(5)}</div>${deltaHtml}</div>`;
  }).join('');
}

function renderWorkoutHistory(){
  const tbody=document.getElementById('workout-history-body');
  if(!workoutSets.length){tbody.innerHTML='<tr><td colspan="4" style="text-align:center;padding:2rem;color:#444;font-size:13px;">No workouts yet</td></tr>';return;}
  tbody.innerHTML=[...workoutSets].reverse().slice(0,100).map(s=>`<tr><td>${s.date.slice(5)}</td><td>${s.movement}</td><td>${s.weight}</td><td>${s.reps}</td></tr>`).join('');
}

function buildBodyCharts(){
  const labels=bodyEntries.map(e=>e.date.slice(5));
  const base=(cb)=>({responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:tc,font:{size:11},maxTicksLimit:12,autoSkip:true},grid:{color:gc}},y:{ticks:{color:tc,font:{size:11},...(cb?{callback:cb}:{})},grid:{color:gc}}}});
  if(bodyCharts.weight)bodyCharts.weight.destroy();
  bodyCharts.weight=new Chart(document.getElementById('chart-weight'),{type:'line',data:{labels,datasets:[{data:bodyEntries.map(e=>e.weight),borderColor:'#E8963A',backgroundColor:'rgba(232,150,58,0.08)',tension:0.35,fill:true,pointRadius:3,pointBackgroundColor:'#E8963A',spanGaps:true}]},options:base()});
  if(bodyCharts.drinks)bodyCharts.drinks.destroy();
  const dd=bodyEntries.map(e=>e.drinks??null);
  bodyCharts.drinks=new Chart(document.getElementById('chart-drinks'),{type:'bar',data:{labels,datasets:[{data:dd,backgroundColor:dd.map(d=>d===0?'#7dba4a':d<=2?'#E8963A':'#d95f4b'),borderRadius:4}]},options:{...base(),scales:{...base().scales,y:{min:0,ticks:{color:tc,font:{size:11}},grid:{color:gc}}}}});
  if(bodyCharts.food)bodyCharts.food.destroy();
  bodyCharts.food=new Chart(document.getElementById('chart-food'),{type:'line',data:{labels,datasets:[{data:bodyEntries.map(e=>e.food?foodScore[e.food]:null),borderColor:'#7dba4a',backgroundColor:'rgba(125,186,74,0.08)',tension:0.3,fill:true,pointRadius:3,pointBackgroundColor:'#7dba4a',spanGaps:true}]},options:{...base(v=>foodAxis[Math.round(v)]||''),scales:{...base().scales,y:{min:0.5,max:4.5,ticks:{color:tc,font:{size:11},callback:v=>foodAxis[Math.round(v)]||''},grid:{color:gc}}}}});
  if(bodyCharts.sleep)bodyCharts.sleep.destroy();
  bodyCharts.sleep=new Chart(document.getElementById('chart-sleep'),{type:'line',data:{labels,datasets:[{data:bodyEntries.map(e=>e.sleep?sleepScore[e.sleep]:null),borderColor:'#7B7FD4',backgroundColor:'rgba(123,127,212,0.08)',tension:0.3,fill:true,pointRadius:3,pointBackgroundColor:'#7B7FD4',spanGaps:true}]},options:{...base(v=>sleepAxis[Math.round(v)]||''),scales:{...base().scales,y:{min:0.5,max:4.5,ticks:{color:tc,font:{size:11},callback:v=>sleepAxis[Math.round(v)]||''},grid:{color:gc}}}}});
}

function buildWorkoutCharts(){
  const container=document.getElementById('workout-chart-container');
  container.innerHTML='';
  Object.values(workoutCharts).forEach(c=>c.destroy());
  workoutCharts={};
  const core=['Incline press','T-bar row','Hex bar deadlift','Leg press','Lat pulldown'];
  const logged=core.filter(m=>workoutSets.some(s=>s.movement===m));
  if(!logged.length){container.innerHTML='<div style="text-align:center;padding:3rem;color:#444;font-size:13px;">No workouts logged yet</div>';return;}
  logged.forEach((m,i)=>{
    const sessions=[...new Set(workoutSets.filter(s=>s.movement===m).map(s=>s.date))].sort();
    const maxPerSession=sessions.map(date=>{
      const sets=workoutSets.filter(s=>s.movement===m&&s.date===date);
      return{date,max:Math.max(...sets.map(s=>s.weight)),sets};
    });
    const cid='wc-'+i;
    const card=document.createElement('div');
    card.className='card';
    card.innerHTML=`<div class="chart-title">${m}</div><div style="position:relative;width:100%;height:180px;"><canvas id="${cid}"></canvas></div>`;
    container.appendChild(card);
    const color=chartColors[i%chartColors.length];
    setTimeout(()=>{
      workoutCharts[m]=new Chart(document.getElementById(cid),{type:'line',data:{labels:maxPerSession.map(s=>s.date.slice(5)),datasets:[{data:maxPerSession.map(s=>s.max),borderColor:color,backgroundColor:color+'18',tension:0.3,fill:true,pointRadius:4,pointBackgroundColor:color}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>{const s=maxPerSession[ctx.dataIndex];return s.sets.map(x=>`${x.weight} lbs × ${x.reps}`).join(', ');},title:ctx=>[maxPerSession[ctx[0].dataIndex].date]}}},scales:{x:{ticks:{color:tc,font:{size:11},maxTicksLimit:10,autoSkip:true},grid:{color:gc}},y:{ticks:{color:tc,font:{size:11}},grid:{color:gc}}}}});
    },50);
  });
}

document.getElementById('log-date').value=new Date().toISOString().slice(0,10);
document.getElementById('workout-date').value=new Date().toISOString().slice(0,10);
loadAll();
</script>
